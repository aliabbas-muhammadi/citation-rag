name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Retrieval eval + recall gate (keyless lexical path)
        # No secrets in CI: runs the BM25 retrieval ablation and fails the build
        # if recall@5 regresses below the gate. Dense/faithfulness need keys and
        # are exercised locally.
        run: npm run eval
